<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loading... - faceb00k</title>
  <meta name="description" content="Loading your account..." />
  <meta name="theme-color" content="#1877f2" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="loading-body">
  <div class="loading-container">
    <div class="loading-logo">faceb00k</div>

    <h1 class="loading-title">Loading Your Account</h1>
    <p class="loading-subtitle">Please wait while we set up your experience...</p>

    <div class="spinner"></div>

    <div class="status-text">Initializing...</div>

    <!-- Security concept note: explains the intentional infinite spinner -->
    <p class="security-note">
      <strong>Security note:</strong> A real phishing page stalls here indefinitely — the victim
      assumes the site is slow while their credentials have already been captured and sent to the attacker.
    </p>

    <a href="index.html" class="back-button">Back to Login</a>
  </div>

  <script src="loading.js"></script>
</body>
</html>
